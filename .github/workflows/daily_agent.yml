name: Daily Follow-up Agent

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

# Grant write permissions to commit the generated webpage back to the repository
permissions:
  contents: write

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Libraries
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Follow-up Agent
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: python agent.py

    - name: Commit and Push Webpage
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add followups.html
        git commit -m "Auto-update follow-up dashboard" || echo "No changes to commit"
        git push
