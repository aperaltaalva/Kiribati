name: Daily Kiribati Macro Monitor

on:
  workflow_dispatch:
  schedule:
    # Weekday morning in the US Eastern business day, expressed in UTC.
    - cron: "0 12 * * 1-5"

jobs:
  daily:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      MODEL: ${{ secrets.MODEL || 'gpt-5.4-mini' }}
      DB_PATH: data/kiribati_monitor.sqlite
      OUTPUT_DIR: output
      LOG_LEVEL: INFO
      HTTP_MAX_ATTEMPTS: 3
      HTTP_BACKOFF_SECONDS: 1.0
      REQUIRE_EMAIL: "false"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      SITE_DIR: site

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest

      - name: Run daily monitor and build site
        run: python -m kiribati_monitor.run_daily --since-hours 24 --fresh-hours 24 --no-email --publish-site

      - name: Run follow-up dashboard agent
        env:
          FOLLOWUPS_SOURCE_PATH: site/index.html
          FOLLOWUPS_OUTPUT_PATH: site/followups.html
          FOLLOWUPS_MODEL: ${{ secrets.FOLLOWUPS_MODEL || 'gpt-5.5' }}
        run: python agent.py

      - name: Refresh site index
        run: python -c "from kiribati_monitor.static_site import publish_static_site; publish_static_site(output_dir='output', site_dir='site')"

      - name: List generated output
        if: always()
        run: |
          echo "Generated files:"
          find output -maxdepth 2 -type f -print || true
          echo "Generated site files:"
          find site -maxdepth 2 -type f -print || true

      - name: Upload generated output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kiribati-monitor-output
          path: output/
          if-no-files-found: error

      - name: Configure GitHub Pages
        if: ${{ always() && hashFiles('site/index.html') != '' }}
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: ${{ always() && hashFiles('site/index.html') != '' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        if: ${{ always() && hashFiles('site/index.html') != '' }}
        id: deployment
        uses: actions/deploy-pages@v4
